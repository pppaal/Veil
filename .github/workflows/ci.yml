name: private-beta-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: veil-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NODE_ENV: test

jobs:
  api-and-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Verify API and packages
        run: pnpm ci:api

      - name: Build API container
        run: docker build -f apps/api/Dockerfile .

  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned for reproducible builds and to stop `stable`-channel SDK
          # drift from silently breaking analyze/build. Bump deliberately and
          # in lockstep with docs/reproducible-builds.md.
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: cd apps/mobile && flutter pub get

      - name: Verify mobile
        run: pnpm ci:mobile

  runtime-smoke:
    # Runs on PRs too (not just main): the web-demo e2e + deploy-preflight gates
    # were main-only, so a string of e2e bugs (navigation, edit-menu, off-screen
    # menu) stayed hidden until merge. Running them on pull_request catches such
    # regressions pre-merge. Costs ~6 min/PR (docker stack), worth it.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs:
      - api-and-packages
      - mobile
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Start alpha stack
        run: pnpm docker:alpha:up

      - name: Wait for services
        run: sleep 5

      - name: Run runtime smoke
        run: pnpm alpha:smoke

      - name: Run deploy preflight
        run: pnpm beta:deploy:preflight -- --env-file apps/api/.env.beta.ci.example

      - name: Generate beta artifacts
        run: |
          pnpm beta:external:bundle
          pnpm beta:production:blockers

      - name: Upload beta artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: private-beta-artifacts
          path: artifacts/*.json
          retention-days: 30

      - name: Stop alpha stack
        if: always()
        run: pnpm docker:alpha:down

      # The single-command demo stack is the path documented in
      # docs/phone-access.md. CI builds it on every runtime smoke so a
      # broken Dockerfile, missing apps/web-demo COPY, or Prisma migration
      # drift fails fast instead of being noticed by an end user.
      - name: Start demo stack
        run: pnpm demo:up

      - name: Wait for demo API
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/v1/health >/dev/null; then
              echo "demo API healthy"
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.demo.yml logs api | tail -50
          exit 1

      - name: Verify /demo/ ships
        run: |
          curl -fsS http://127.0.0.1:3000/demo/index.html | head -1
          curl -fsS -o /dev/null http://127.0.0.1:3000/demo/app.js
          curl -fsS -o /dev/null http://127.0.0.1:3000/demo/app.css
          curl -fsS -o /dev/null http://127.0.0.1:3000/demo/socket.io.min.js

      # Phase AN: Playwright e2e against the live demo stack. Chromium
      # only — Firefox / WebKit are added if the suite stabilises.
      - name: Install Playwright browsers
        run: pnpm e2e:web:install

      - name: Run web demo e2e
        run: pnpm e2e:web

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop demo stack
        if: always()
        run: pnpm demo:down

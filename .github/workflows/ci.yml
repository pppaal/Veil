name: private-beta-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: veil-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true

jobs:
  api-and-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify API and packages
        run: pnpm ci:api

      - name: Build API container
        run: docker build -f apps/api/Dockerfile .

  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify mobile
        run: pnpm ci:mobile

  runtime-smoke:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs:
      - api-and-packages
      - mobile
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Start alpha stack
        run: pnpm docker:alpha:up

      - name: Run runtime smoke
        run: pnpm alpha:smoke

      - name: Run deploy preflight
        run: pnpm beta:deploy:preflight -- --env-file apps/api/.env.beta.ci.example

      - name: Generate beta artifacts
        run: |
          pnpm beta:release:evidence
          pnpm beta:perf:template
          pnpm beta:review:manifest

      - name: Upload beta artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: private-beta-artifacts
          path: artifacts/*.json

      - name: Stop alpha stack
        if: always()
        run: pnpm docker:alpha:down

name: veil_mobile
description: VEIL privacy-first messenger MVP shell
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.0
  drift: ^2.28.2
  sqlite3: ^3.2.0
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  intl: ^0.20.2
  http: ^1.3.0
  socket_io_client: ^3.1.2
  crypto: ^3.0.6
  cryptography: ^2.7.0
  flutter_local_notifications: ^21.0.0
  qr_flutter: ^4.1.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.28.2
  build_runner: ^2.7.0
  image: ^4.3.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/branding/app_icon.png"
  min_sdk_android: 23
  remove_alpha_ios: true
  background_color_ios: "#06080D"
  adaptive_icon_background: "#06080D"
  adaptive_icon_foreground: "assets/branding/app_icon_foreground.png"
  web:
    generate: false
  windows:
    generate: true
    image_path: "assets/branding/app_icon.png"
    icon_size: 256

flutter_native_splash:
  color: "#06080D"
  image: "assets/branding/splash.png"
  branding: "assets/branding/splash_branding.png"
  branding_mode: "bottom"
  android_12:
    color: "#06080D"
    image: "assets/branding/splash.png"
  android: true
  ios: true
  web: false
  fullscreen: true

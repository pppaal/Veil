<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1" />
<meta name="theme-color" content="#0b0c10" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>VEIL</title>
<link rel="stylesheet" href="./app.css" />
<script src="./socket.io.min.js" defer></script>
</head>
<body>
<div id="toast-root"></div>

<!-- AUTH SCREEN -->
<section id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-mark">V</div>
      <div class="brand-title">VEIL</div>
      <div class="brand-tag">private beta</div>
    </div>

    <div id="restore-row" class="restore-row hidden">
      <div class="restore-info">
        <div class="restore-label">저장된 세션</div>
        <div class="restore-handle" id="restore-handle">@…</div>
      </div>
      <button id="restore-btn" class="btn btn-primary btn-compact">계속</button>
    </div>

    <form id="register-form" class="auth-form" autocomplete="off" novalidate>
      <label class="field">
        <span class="field-label">표시 이름</span>
        <input id="reg-name" type="text" placeholder="Alice" maxlength="40" />
      </label>
      <label class="field">
        <span class="field-label">핸들</span>
        <input id="reg-handle" type="text" placeholder="alice" pattern="[a-z0-9_]+" maxlength="32" autocapitalize="off" autocorrect="off" spellcheck="false" />
        <span class="field-hint">소문자, 숫자, _ 만 가능. 한 번 정하면 못 바꿔요.</span>
      </label>
      <button id="reg-btn" type="submit" class="btn btn-primary">새 핸들로 시작</button>
    </form>

    <div class="auth-meta">
      <div class="meta-line">서버는 ciphertext만 봅니다</div>
      <div class="meta-line">백업 없음 · 복구 없음 · 디바이스 묶임</div>
    </div>

    <button id="wipe-btn" class="link-btn link-danger hidden">이 브라우저의 키 전부 삭제</button>
  </div>
</section>

<!-- MAIN APP -->
<div id="app" class="app hidden">
  <header class="topbar">
    <button class="icon-btn icon-btn-only-mobile" id="back-to-list" aria-label="대화 목록으로">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="topbar-brand">
      <span class="topbar-mark">V</span>
      <span class="topbar-name">VEIL</span>
      <span class="topbar-pill" id="conn-pill">연결 중…</span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="split-btn" title="분할 보기" aria-label="분할 보기">
        <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="4" width="8" height="16" rx="1.5" stroke="currentColor" stroke-width="2" fill="none"/><rect x="13" y="4" width="8" height="16" rx="1.5" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      </button>
      <button class="icon-btn" id="menu-btn" aria-label="메뉴">
        <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>
      </button>
    </div>
  </header>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-me" id="sidebar-me"></div>
    <div class="sidebar-actions">
      <button id="new-chat-btn" class="btn btn-secondary btn-block">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        새 대화
      </button>
    </div>
    <div class="sidebar-search">
      <input id="search-input" type="text" placeholder="대화 검색…" autocomplete="off" />
    </div>
    <nav class="conv-list" id="conv-list" aria-label="대화 목록"></nav>
  </aside>

  <main class="main" id="main">
    <div class="tab-strip" id="tab-strip"></div>
    <div class="panels" id="panels"></div>
  </main>

  <!-- New chat dialog -->
  <div class="dialog-backdrop hidden" id="new-chat-dialog">
    <div class="dialog">
      <div class="dialog-title">새 다이렉트 챗</div>
      <div class="dialog-sub">상대 핸들을 입력하세요. 같은 서버에 등록된 핸들이어야 해요.</div>
      <input id="new-peer-input" type="text" placeholder="bob" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <div class="dialog-error" id="new-peer-error"></div>
      <div class="dialog-actions">
        <button class="btn btn-ghost" id="new-cancel">취소</button>
        <button class="btn btn-primary" id="new-confirm">시작</button>
      </div>
    </div>
  </div>

  <!-- Menu dropdown -->
  <div class="menu hidden" id="menu" role="menu">
    <button class="menu-item" data-action="copy-handle" role="menuitem">내 핸들 복사</button>
    <button class="menu-item" data-action="ws-info" role="menuitem">연결 상태</button>
    <div class="menu-sep"></div>
    <button class="menu-item menu-danger" data-action="wipe" role="menuitem">로그아웃 + 키 삭제</button>
  </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>

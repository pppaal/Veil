<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>VEIL · 일회성 비밀 링크</title>
<style>
  :root{
    --bg:#F4F3FA;--surf:#fff;--stroke:#E6E4F0;--text:#0B0B12;--muted:#7C7A88;
    --brand:#6E56F8;--brand2:#7B66FF;--brandSoft:#EFEAFF;--danger:#FF3B30;--success:#2BB24C;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;
    background:radial-gradient(900px 500px at 50% -8%,#EAE6FF,var(--bg) 55%);color:var(--text);
    min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:48px 18px;line-height:1.5;}
  .wrap{max-width:520px;width:100%;}
  .brand{display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:22px;}
  .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand2),var(--brand));display:flex;align-items:center;justify-content:center;}
  .brand b{font-size:18px;letter-spacing:.02em;}
  .card{background:var(--surf);border:1px solid var(--stroke);border-radius:22px;padding:24px;box-shadow:0 18px 40px rgba(80,60,180,.08);}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:.16em;color:var(--brand);text-transform:uppercase;}
  h1{font-size:19px;font-weight:800;margin:6px 0 16px;letter-spacing:-.01em;}
  label{font-size:12.5px;font-weight:700;color:var(--muted);display:block;margin:0 0 7px;}
  textarea,input{width:100%;border:1px solid var(--stroke);border-radius:13px;padding:13px 14px;font:inherit;font-size:14.5px;background:#FBFBFE;color:var(--text);}
  textarea{min-height:104px;resize:vertical;}
  textarea:focus,input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brandSoft);}
  .btn{height:50px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--brand2),var(--brand));color:#fff;font:inherit;font-weight:700;font-size:15.5px;width:100%;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;}
  .btn.ghost{background:#fff;border:1px solid var(--stroke);color:var(--text);}
  .btn.danger{background:#fff;border:1px solid #FFD9D6;color:var(--danger);}
  .btn:disabled{opacity:.55;cursor:default;}
  .opt{display:flex;align-items:center;gap:9px;margin-top:14px;font-size:13.5px;cursor:pointer;}
  .opt input{width:18px;height:18px;accent-color:var(--brand);}
  .linkbox{margin-top:16px;background:var(--brandSoft);border:1px dashed #CFC4FF;border-radius:13px;padding:13px 14px;font-size:12.5px;word-break:break-all;color:#3A2E80;font-family:ui-monospace,Menlo,monospace;}
  .pillrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px;}
  .pill{font-size:11.5px;font-weight:600;color:var(--brand);background:var(--brandSoft);border-radius:999px;padding:6px 11px;}
  .reveal{background:#fff;border:1px solid var(--stroke);border-radius:13px;padding:16px;font-size:15px;white-space:pre-wrap;word-break:break-word;min-height:60px;}
  .hint{font-size:12px;color:var(--muted);margin-top:12px;line-height:1.55;}
  .err{color:var(--danger);font-size:13.5px;font-weight:600;margin-top:10px;}
  .center{text-align:center;}
  .gone .big{font-size:34px;margin-bottom:8px;}
  .cta{margin-top:18px;text-align:center;font-size:13px;color:var(--muted);}
  .cta a{color:var(--brand);font-weight:700;text-decoration:none;}
  .copied{color:var(--success);font-size:12.5px;font-weight:700;height:16px;margin-top:8px;}
  .spin{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:r .7s linear infinite;}
  @keyframes r{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="logo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><rect x="5" y="11" width="14" height="9" rx="2.2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span><b>VEIL</b></div>

  <!-- COMPOSE -->
  <div class="card" id="compose" style="display:none;">
    <div class="eyebrow">일회성 비밀 링크</div>
    <h1>한 번 읽히면 사라지는 메시지</h1>
    <label for="secret">비밀 내용</label>
    <textarea id="secret" placeholder="비밀번호, 계좌, 민감한 메모… 받는 사람은 앱 없이 한 번만 열람합니다."></textarea>
    <label class="opt"><input type="checkbox" id="usePass"> 암호문구 추가 (링크에 키를 넣지 않음 — 더 안전)</label>
    <div id="passWrap" style="display:none;margin-top:10px;"><input type="password" id="pass" placeholder="상대에게 따로 알려줄 암호문구"></div>
    <button class="btn" id="genBtn">보안 링크 생성</button>
    <div id="out" style="display:none;">
      <div class="linkbox" id="linkText"></div>
      <button class="btn ghost" id="copyBtn">링크 복사</button>
      <div class="copied" id="copied"></div>
      <div class="pillrow"><span class="pill">🔒 종단간 암호화</span><span class="pill">🙈 서버는 평문·키 못 봄</span><span class="pill">💨 읽으면 소멸</span></div>
    </div>
    <div class="err" id="cErr" style="display:none;"></div>
    <div class="hint">암호문만 서버에 잠깐 보관되고, <b>최초 1회 열람 시 즉시 삭제</b>됩니다. 복호화 키는 링크의 <code>#</code> 뒤에만 담겨 서버로 전송되지 않습니다.</div>
  </div>

  <!-- VIEW -->
  <div class="card" id="view" style="display:none;">
    <div class="eyebrow">받은 비밀 메시지</div>
    <h1 id="viewTitle">메시지를 여는 중…</h1>
    <div id="loading" class="center" style="padding:24px 0;"><span class="spin" style="border-top-color:var(--brand);border-color:var(--brandSoft);"></span></div>
    <div id="passPrompt" style="display:none;">
      <label for="passIn">암호문구 입력</label>
      <input type="password" id="passIn" placeholder="보낸 사람이 알려준 암호문구">
      <button class="btn" id="passBtn">복호화</button>
      <div class="err" id="vErr" style="display:none;"></div>
    </div>
    <div id="revealWrap" style="display:none;">
      <div class="reveal" id="revealText"></div>
      <div class="hint">⏱️ 이 메시지는 <b>한 번만</b> 표시됩니다. 새로고침하면 사라집니다 — 서버에서 이미 삭제되었습니다.</div>
    </div>
    <div id="gone" class="center gone" style="display:none;padding:20px 0;">
      <div class="big">💨</div><b id="goneMsg">이미 열렸거나 만료된 링크입니다</b>
      <div class="hint" style="margin-top:6px;">일회성 비밀 링크는 한 번만 열 수 있습니다.</div>
    </div>
    <div class="cta">VEIL — 번호 없이, 흔적 없이. <a href="/demo/">앱 둘러보기 →</a></div>
  </div>
</div>

<script>
const enc=new TextEncoder(),dec=new TextDecoder();
const API='/v1';
const b64u={e:b=>btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''),
  d:s=>{s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}};
async function deriveKey(pass,salt){const base=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:210000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
// Returns { blob, frag } — blob goes to the server (no key!), frag goes in the link.
async function seal(plain,pass){
  const iv=crypto.getRandomValues(new Uint8Array(12));let key,frag,salt,blob;
  if(pass){salt=crypto.getRandomValues(new Uint8Array(16));key=await deriveKey(pass,salt);frag='p';}
  else{key=await crypto.subtle.generateKey({name:'AES-GCM',length:256},true,['encrypt','decrypt']);
    frag='k.'+b64u.e(await crypto.subtle.exportKey('raw',key));}
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(plain));
  blob = pass ? `v1.${b64u.e(iv)}.${b64u.e(ct)}.${b64u.e(salt)}` : `v1.${b64u.e(iv)}.${b64u.e(ct)}`;
  return {blob,frag};
}
async function open(blob,fragKind,fragKey,passMaybe){
  const parts=blob.split('.');const iv=b64u.d(parts[1]),ct=b64u.d(parts[2]);let key;
  if(fragKind==='k'){key=await crypto.subtle.importKey('raw',b64u.d(fragKey),{name:'AES-GCM'},false,['decrypt']);}
  else{if(!passMaybe){const e=new Error('PASS');e.code='PASS';throw e;}key=await deriveKey(passMaybe,b64u.d(parts[3]));}
  return dec.decode(await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct));
}
window.__veil={seal,open};

const $=id=>document.getElementById(id);
const hash=location.hash.slice(1);

// ---------- VIEW MODE (fragment present: <id>.<k.<key>|p>) ----------
if(hash){
  $('view').style.display='block';
  const dot=hash.indexOf('.');
  const id=hash.slice(0,dot), frag=hash.slice(dot+1);
  const fragKind=frag[0]==='k'?'k':'p';
  const fragKey=fragKind==='k'?frag.slice(2):'';
  let blobCache=null;
  async function fetchBlob(){
    const r=await fetch(`${API}/s/${id}`);
    if(r.status!==200){const e=new Error('GONE');e.code='GONE';throw e;}
    const j=await r.json();return j.ciphertext;
  }
  async function run(passMaybe){
    try{
      if(!blobCache) blobCache=await fetchBlob();   // GET burns it server-side
      const text=await open(blobCache,fragKind,fragKey,passMaybe);
      $('loading').style.display='none';$('passPrompt').style.display='none';
      $('viewTitle').textContent='비밀 메시지';
      $('revealText').textContent=text;$('revealWrap').style.display='block';
    }catch(e){
      $('loading').style.display='none';
      if(e.code==='PASS'){$('viewTitle').textContent='암호문구가 필요합니다';$('passPrompt').style.display='block';$('passIn').focus();return;}
      if(e.code==='GONE'){$('viewTitle').textContent='';$('gone').style.display='block';return;}
      // blob fetched (burned) but decryption failed → show as decryption error, not gone
      $('viewTitle').textContent='';$('vErr')&&($('vErr').style.display='block',$('vErr').textContent='복호화 실패 — 잘못된 링크/암호문구입니다.');
      if($('passPrompt').style.display!=='block'){$('gone').style.display='block';$('goneMsg').textContent='열 수 없는 링크입니다';}
    }
  }
  $('passBtn').onclick=()=>run($('passIn').value);
  run('');
}
// ---------- COMPOSE MODE (no fragment) ----------
else{
  $('compose').style.display='block';
  $('usePass').onchange=e=>$('passWrap').style.display=e.target.checked?'block':'none';
  let lastLink='';
  $('genBtn').onclick=async()=>{
    $('cErr').style.display='none';
    const secret=$('secret').value.trim();if(!secret){$('secret').focus();return;}
    const pass=$('usePass').checked?$('pass').value:'';
    if($('usePass').checked&&!pass){$('pass').focus();return;}
    const btn=$('genBtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
    try{
      const {blob,frag}=await seal(secret,pass);
      const r=await fetch(`${API}/s`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ciphertext:blob})});
      if(!r.ok) throw new Error('server');
      const {id}=await r.json();
      lastLink=`${location.origin}/demo/s.html#${id}.${frag}`;
      $('linkText').textContent=lastLink;$('out').style.display='block';$('copied').textContent='';
    }catch(e){$('cErr').style.display='block';$('cErr').textContent='링크 생성 실패 — 잠시 후 다시 시도하세요.';}
    finally{btn.disabled=false;btn.textContent='보안 링크 생성';}
  };
  $('copyBtn').onclick=async()=>{try{await navigator.clipboard.writeText(lastLink);$('copied').textContent='복사됨 ✓';}catch{$('copied').textContent='수동 복사하세요';}};
}
</script>
</body>
</html>

# Production TURN configuration.
# Override via --flag in docker-compose.coturn.yml; this file is a static
# baseline suitable for a single-region VPS deployment.
#
# Before first boot:
#   1. Set TURN_SHARED_SECRET to a 32-byte hex value (openssl rand -hex 32).
#   2. Replace the external-ip below with the host's public IPv4.
#   3. Point turn.veil.app DNS at this host and provision a TLS cert.
#   4. Open UDP 3478, TCP 3478, TCP 5349, and UDP 49152-65535.
#
# Rotation:
#   - TURN_SHARED_SECRET can be rotated independently of the API JWT key.
#   - The API re-reads the secret from env on next request; no restart
#     needed if it's supplied via a secret-reload sidecar.

listening-port=3478
tls-listening-port=5349

# Set externally — `docker compose --env-file` or Kubernetes secret.
# external-ip=203.0.113.5/10.0.0.5

# Relay port range. Narrower range reduces firewall surface; wider range
# helps heavy concurrent call volumes. 16k ports = ~2k concurrent calls.
min-port=49152
max-port=65535

# Authentication: shared-secret mode so the API can mint short-lived creds.
use-auth-secret
# static-auth-secret supplied via command line from env

# TLS cert paths; point at your provisioning (certbot/acme/vault).
# cert=/etc/letsencrypt/live/turn.veil.app/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.veil.app/privkey.pem

# Privacy: never relay into private ranges or multicast.
no-loopback-peers
no-multicast-peers
no-tlsv1
no-tlsv1_1

# Reduce observability surface.
no-cli
no-stdout-log
log-file=stdout
simple-log

# Prometheus metrics scrape target on :9641 by default.
prometheus

# Fingerprint all STUN responses (RFC 5389 compliance for modern clients).
fingerprint

# Limit total concurrent allocations to keep a single VPS stable.
total-quota=10000
user-quota=100

# Stale-nonce helps against TURN replay attacks.
stale-nonce=600

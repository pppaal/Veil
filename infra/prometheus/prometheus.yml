# Prometheus scrape config. The /metrics endpoint is gated by a Bearer
# token; we ship it through bearer_token_file pointing at an env-mounted
# file. The file is materialized via the `command` substitution at boot.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: veil-api
    metrics_path: /v1/metrics
    scheme: http
    static_configs:
      - targets: ["api:3000"]
    # The auth token is templated from the same env var the API reads,
    # passed in via docker-compose's environment block.
    authorization:
      type: Bearer
      credentials: ${VEIL_METRICS_AUTH_TOKEN}

  - job_name: prometheus-self
    static_configs:
      - targets: ["localhost:9090"]
